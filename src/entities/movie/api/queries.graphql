query GetMovies(
  $limit: Int!
  $offset: Int!
  $sort: MovieSort
  $filter: MovieFilter
) {
  getMoviesOffset(
    limit: $limit
    offset: $offset
    sort: $sort
    filter: $filter
  ) {
    nodes {
      ...SeriesListItem
      ...FilmListItem
    }
    pageInfo {
      totalCount
    }
  }
}

query GetPopularMovies($limit: Int!, $offset: Int!) {
  getMoviesOffset(
    limit: $limit
    offset: $offset
    sort: { stats: { popularityScore: { direction: DESC, nulls: LAST } } }
  ) {
    nodes {
      ...SeriesMiniCard
      ...FilmMiniCard
    }
    pageInfo {
      totalCount
    }
  }
}
